repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        name: ruff lint
      - id: ruff-format
        name: ruff format check
        args: [--check]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        files: ^src/
        additional_dependencies:
          - pydantic>=2.7
          - typer>=0.12
          - rich>=13.7
